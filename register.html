<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register — PDcars</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap');
        @import url('https://fonts.googleapis.com/css2?family=Pacifico&display=swap');
    </style>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        :root {
            --accent: #c8a44a;
            --dark: #000000;
            --white: #ffffff;
            --muted: rgba(255, 255, 255, 0.65);
            --border: rgba(255, 255, 255, 0.07);
            --nav-offset: 104px;
        }

        body {
            min-height: 100vh;
            overflow-x: hidden;
        }

        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            min-height: 86px;
            padding: 8px 48px 12px;
            background: var(--dark);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 200;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 34px;
            font-family: "Pacifico", cursive;
            color: var(--white);
            text-decoration: none;
        }

        .toyo {
            width: 44px;
            height: 44px;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 40px;
            list-style: none;
        }

        .nav-links a {
            text-decoration: none;
            color: var(--muted);
            font-size: 16px;
            font-weight: 500;
            position: relative;
            padding-bottom: 3px;
            transition: color 0.2s ease;
        }

        .nav-links a::after {
            content: "";
            position: absolute;
            left: 0;
            bottom: 0;
            width: 0;
            height: 2px;
            background: var(--accent);
            transition: width 0.3s ease;
        }

        .nav-links a:hover,
        .nav-links a.active {
            color: var(--white);
        }

        .nav-links a:hover::after,
        .nav-links a.active::after {
            width: 100%;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .nav-btn {
            display: inline-flex;
            align-items: center;
            padding: 11px 24px;
            border-radius: 8px;
            background: var(--accent);
            color: var(--dark);
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 0.4px;
            text-decoration: none;
            transition: box-shadow 0.2s ease, transform 0.2s ease;
        }

        .nav-btn:hover {
            box-shadow: 0 0 20px rgba(200, 164, 74, 0.45);
            transform: translateY(-1px);
        }

        .page-shell {
            min-height: 100vh;
            width: 100%;
            display: grid;
            place-items: center;
            padding: var(--nav-offset) 20px 24px;
            position: relative;
            z-index: 1;
        }

        .wrapper {
            width: 415px;
            height: 580px;
            margin: 0 auto;
            background: rgba(255, 255, 255, 0.12);
            -webkit-backdrop-filter: blur(20px);
            backdrop-filter: blur(20px);
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            color: #ffffff;
            display: flex;
            justify-content: center;
            border-radius: 30px;
            border: 2px solid rgba(225, 225, 225, 0.2);
        }

        h2 {
            font-size: 40px;
            color: #fff;
            font-family: "Poppins", sans-serif;
            font-weight: 600;
            padding-top: 30px;
            padding-bottom: 20px;
            text-align: center;
        }

        .wrapper .input-box {
            display: flex;
            justify-content: space-between;
            width: 340px;
            height: 45px;
            outline: none;
            border: 2px solid rgba(225, 225, 225, 0.2);
            border-radius: 50px;
            padding: 5px 0px;
            margin-bottom: 20px;
        }

        .input-box>input {
            border: none;
            outline: none;
            background: transparent;
            padding-left: 2px;
            margin-left: 15px;
            margin-right: 15px;
            color: #fff;
            width: 100%;
        }

        .input-box input::placeholder {
            color: #fff;
        }

        .input-box>i {
            padding-top: 7px;
            padding-right: 15px;
        }

        .remember-forgot {
            display: flex;
            justify-content: space-between;
            font-size: 15px;
            gap: 12px;
            margin-bottom: 10px;
        }

        .remember-forgot label {
            display: flex;
            align-items: center;
            gap: 8px;
            cursor: pointer;
        }

        button {
            width: 100%;
            height: 45px;
            border: none;
            border-radius: 30px;
            font-size: 17px;
            font-weight: 600;
            justify-content: center;
            margin-top: 10px;
            margin-bottom: 10px;
            cursor: pointer;
            transition: background 0.2s;
        }

        button:hover {
            background: #e5c168;
        }

        .register-link {
            font-size: 14px;
            text-align: center;
            color: white;
        }

        .register-link p a {
            color: #fff;
            text-decoration: none;
            font-weight: 600;
        }

        .remember-forgot a {
            color: #fff;
            text-decoration: none;
        }

        .video-background {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            z-index: -100;
        }

        #bg-video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            object-position: center 25%;
        }

        @media (max-width: 900px) {
            :root {
                --nav-offset: 152px;
            }

            .navbar {
                padding: 14px 20px 16px;
                flex-wrap: wrap;
                gap: 16px;
            }

            .nav-links {
                flex-wrap: wrap;
                justify-content: center;
                gap: 18px;
            }

            .logo {
                font-size: 36px;
            }

            .nav-right {
                width: 100%;
                justify-content: center;
            }
        }

        @media (max-width: 480px) {
            :root {
                --nav-offset: 104px;
            }

            .navbar {
                justify-content: center;
                padding: 14px 16px 16px;
            }

            .nav-links {
                display: none;
            }

            .wrapper {
                width: 100%;
                max-width: 415px;
                height: auto;
                padding: 24px 20px;
            }

            .wrapper .input-box {
                width: 100%;
            }

            .remember-forgot {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>

<body>
    <div class="video-background">
        <video autoplay muted loop id="bg-video">
            <source src="videos/realone.mp4" type="video/mp4">
            Your browser does not support the video tag.
        </video>
    </div>
    <nav class="navbar">
        <a href="hellow.html" class="logo">
            <img src="tyres.png" class="toyo" alt="PD Cars logo">PDcars
        </a>

        <ul class="nav-links">
            <li><a href="hellow.html">Home</a></li>
            <li><a href="newabout.html">About</a></li>
            <li><a href="find-cars.html">Find Cars</a></li>
            <li><a href="contact.html">Contact</a></li>
        </ul>

        <div class="nav-right">
            <a href="login.html" class="nav-btn">Sign Up</a>
        </div>
    </nav>
    <div class="page-shell">
        <div class="wrapper">
            <form action="">
                <h2>Register</h2>
                <div class="input-box">
                    <input type="text" placeholder="Full Name" required>
                    <i><ion-icon name="person"></ion-icon></i>
                </div>
                <div class="input-box">
                    <input type="email" placeholder="Email Address" required>
                    <i><ion-icon name="mail"></ion-icon></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Password" required>
                    <i><ion-icon name="lock-closed"></ion-icon></i>
                </div>
                <div class="input-box">
                    <input type="password" placeholder="Confirm Password" required>
                    <i><ion-icon name="lock-closed"></ion-icon></i>
                </div>
                <div class="remember-forgot">
                    <label><input type="checkbox" required> I agree to the terms & conditions</label>
                </div>
                <button type="submit">Register</button>
                <div class="register-link">
                    <p>Already have an account? <a href="login.html">Login</a></p>
                </div>
            </form>
        </div>
    </div>
    <script type="module" src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script nomodule src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
</body>

</html>
