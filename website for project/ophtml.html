<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Hover Glow Button</title>
  <style>
    body {
      background-color: #121212;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .glow-button {
      padding: 15px 35px;
      font-size: 18px;
      color: white;
      background-color: #1e1e1e;
      border: 2px solid #00f0ff;
      border-radius: 10px;
      cursor: pointer;
      transition: 0.4s ease;
    }

    .glow-button:hover {
      box-shadow: 0 0 10px #00f0ff, 0 0 20px #00f0ff, 0 0 30px #00f0ff;
      background-color: #00f0ff33; /* subtle glow inside */
      color: #00f0ff;
    }

    .section-divider {
  height: 2px;
  width: 100%;
  margin: 40px auto;
  background-color: #e53935; /* red or your brand color */
  border-radius: 10px;
}
.container{
    display: flex;
    flex-direction: column;
    width: 100%;
}
.dashed-divider {
  border-top: 2px dashed #555;
  width: 20%;
  margin: 40px auto;
}

  </style>
</head>
<body>
<div class="container">
  <div>  <button class="glow-button">Get Started</button>  </div>
<div class="section-divider"></div>
<div class="dashed-divider"></div>

</div>


  
</body>
</html>
